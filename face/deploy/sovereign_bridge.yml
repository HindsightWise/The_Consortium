version: '3.8'
services:
  janus_core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - RUST_LOG=info
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JANUS_SETTLEMENT_ACCOUNT=${JANUS_US_BANK_ACCOUNT}
    volumes:
      - ./settlement_logs:/Users/zerbytheboss/The_Consortium/logs
    ports:
      - "8443:8443"
    networks:
      - janus_secure
      - caiso_dmz
  
  redis_recovery:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - janus_secure

networks:
  janus_secure:
    internal: true
  caiso_dmz:
    external: true
    name: caiso_partner_network