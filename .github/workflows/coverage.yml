name: Strict Code Coverage Gate

on:
  pull_request:
    branches: [ "main" ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            core -> target
            face -> target

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run Coverage 
        run: |
          # SOP 7.1: 80% Hard Gate
          # Running coverage on both core and face if they exist
          if [ -d "core" ]; then
            cd core && cargo tarpaulin --fail-under 80 --out Xml && cd ..
          fi
          if [ -d "face" ]; then
            cd face && cargo tarpaulin --fail-under 80 --out Xml && cd ..
          fi
